<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Screenshot Preview</title>
  <style>
    /* Skip link for accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #0078d4;
      color: white;
      padding: 8px 16px;
      text-decoration: none;
      border-radius: 0 0 4px 0;
      z-index: 10000;
      font-size: 14px;
    }

    .skip-link:focus {
      top: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      overflow: hidden;
      direction: ltr;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      background: #2d2d2d;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #3d3d3d;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px;
      border-right: 1px solid #3d3d3d;
    }

    .toolbar-group:last-child {
      border-right: none;
    }

    .tool-btn {
      background: transparent;
      border: 1px solid transparent;
      color: #ccc;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 13px;
      transition: all 0.2s ease;
      min-width: 36px;
      position: relative;
    }

    .tool-btn:hover {
      background: #3d3d3d;
      border-color: #4d4d4d;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .tool-btn:active {
      transform: translateY(0);
    }

    .tool-btn:focus-visible {
      outline: 2px solid #0078d4;
      outline-offset: 2px;
      box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.3);
    }

    .tool-btn.active {
      background: #0078d4;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 120, 212, 0.4);
    }

    .tool-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .tool-btn.loading::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .tool-btn svg {
      width: 18px;
      height: 18px;
    }

    .tool-btn .label {
      display: none;
    }

    .tool-btn:hover .label,
    .tool-btn.active .label {
      display: inline;
    }

    .color-picker {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
    }

    .color-picker::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-picker::-webkit-color-swatch {
      border: 2px solid #3d3d3d;
      border-radius: 4px;
    }

    .line-width {
      background: #3d3d3d;
      border: 1px solid #4d4d4d;
      color: #ccc;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* Container for the canvas - takes all remaining space */
    .canvas-container {
      position: relative;
      overflow: auto;
      flex: 1;
      background: #f0f0f0;
      min-height: 0;
    }

    /* Wrapper for the canvas - centered in the middle */
    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100%;
      padding: 20px;
    }

    #canvas {
      background: white;
      cursor: crosshair;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      flex-shrink: 0;
      border: 1px solid #ddd;
      /* Scale canvas to fit within container while maintaining aspect ratio */
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .status-bar {
      background: #2d2d2d;
      padding: 8px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #3d3d3d;
      font-size: 12px;
      color: #999;
      flex-shrink: 0;
    }

    .status-info {
      display: flex;
      gap: 20px;
    }

    .text-input-container {
      position: absolute;
      border: 1px dashed #0078d4;
      z-index: 100;
      display: none;
      min-width: 100px;
      min-height: 30px;
    }

    .text-input {
      background: transparent;
      border: none;
      color: #ff0000;
      font-family: Arial, sans-serif;
      font-size: 16px;
      padding: 5px;
      outline: none;
      width: 100%;
      height: 100%;
      min-height: 30px;
      box-sizing: border-box;
      resize: none;
      overflow: hidden;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.2;
    }

    /* Resize handles */
    .resize-handle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #0078d4;
      border: 1px solid white;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 101;
    }

    .text-input-container:hover .resize-handle,
    .text-input-container.resizing .resize-handle {
      opacity: 1;
    }

    /* Corner handles */
    .resize-handle.nw {
      top: -5px;
      left: -5px;
      cursor: nw-resize;
    }

    .resize-handle.ne {
      top: -5px;
      right: -5px;
      cursor: ne-resize;
    }

    .resize-handle.se {
      bottom: -5px;
      right: -5px;
      cursor: se-resize;
    }

    .resize-handle.sw {
      bottom: -5px;
      left: -5px;
      cursor: sw-resize;
    }

    /* Edge handles */
    .resize-handle.n {
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      cursor: n-resize;
    }

    .resize-handle.e {
      top: 50%;
      right: -5px;
      transform: translateY(-50%);
      cursor: e-resize;
    }

    .resize-handle.s {
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      cursor: s-resize;
    }

    .resize-handle.w {
      top: 50%;
      left: -5px;
      transform: translateY(-50%);
      cursor: w-resize;
    }

    .highlight-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 50;
    }

    /* More tools dropdown */
    .more-tools-container {
      position: relative;
    }

    .more-tools-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: #2d2d2d;
      border: 1px solid #3d3d3d;
      border-radius: 8px;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 4px;
      min-width: 180px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      z-index: 1000;
    }

    .more-tools-dropdown.show {
      display: flex;
    }

    .more-tools-dropdown .tool-btn {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
    }

    .more-tools-dropdown .tool-btn .label {
      display: inline;
      margin-left: 8px;
    }

    /* High contrast mode improvements */
    @media (prefers-contrast: high) {
      .tool-btn {
        border-color: #666;
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="toolbar" role="toolbar" aria-label="Annotation tools">
    <div class="toolbar-group" role="group" aria-label="Drawing tools">
      <button class="tool-btn active" id="select-tool" aria-label="Select tool (V)" title="Select (V)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
        </svg>
      </button>
      <button class="tool-btn" id="rect-tool" aria-label="Rectangle tool (R)" title="Rectangle (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
      </button>
      <button class="tool-btn" id="arrow-tool" aria-label="Arrow tool (A)" title="Arrow (A)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
      <button class="tool-btn" id="text-tool" aria-label="Text tool (T)" title="Text (T)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="4 7 4 4 20 4 20 7"/>
          <line x1="9" y1="20" x2="15" y2="20"/>
          <line x1="12" y1="4" x2="12" y2="20"/>
        </svg>
      </button>
      <div class="more-tools-container">
        <button class="tool-btn" id="more-tools-btn" aria-label="More tools" aria-expanded="false" aria-haspopup="true" title="More tools">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="1"/>
            <circle cx="12" cy="5" r="1"/>
            <circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
        <div class="more-tools-dropdown" id="more-tools-dropdown" role="menu" aria-label="Additional tools">
          <button class="tool-btn" id="highlight-tool" role="menuitem" aria-label="Highlight tool (H)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 19l7-7 3 3-7 7-3-3z"/>
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            </svg>
            <span class="label">Highlight</span>
          </button>
          <button class="tool-btn" id="blur-tool" role="menuitem" aria-label="Blur tool (B)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="12" cy="12" r="1"/>
            </svg>
            <span class="label">Blur</span>
          </button>
        </div>
      </div>
    </div>

    <div class="toolbar-group" role="group" aria-label="Blur settings">
      <label for="blur-amount" class="tool-btn" style="cursor: default; padding: 4px 8px; font-size: 11px;">Blur:</label>
      <select id="blur-amount" class="line-width" title="Blur Strength" aria-label="Blur strength">
        <option value="5">Light</option>
        <option value="10" selected>Medium</option>
        <option value="20">Strong</option>
        <option value="30">Very Strong</option>
      </select>
    </div>

    <div class="toolbar-group" role="group" aria-label="Style settings">
      <input type="color" id="color-picker" class="color-picker" value="#ff0000" title="Color" aria-label="Annotation color">
      <select id="line-width" class="line-width" title="Line Width" aria-label="Line width">
        <option value="2">2px</option>
        <option value="4" selected>4px</option>
        <option value="6">6px</option>
        <option value="8">8px</option>
        <option value="12">12px</option>
      </select>
    </div>

    <div class="toolbar-group" role="group" aria-label="Edit actions">
      <button class="tool-btn" id="undo-btn" aria-label="Undo (Ctrl+Z)" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 7v6h6"/>
          <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
        </svg>
      </button>
      <button class="tool-btn" id="clear-btn" aria-label="Clear all annotations (Ctrl+Del)" title="Clear All (Ctrl+Del)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
        </svg>
      </button>
    </div>

    <div class="toolbar-group" role="group" aria-label="Screenshot actions">
      <button class="tool-btn" id="new-screenshot-btn" aria-label="New screenshot (Ctrl+N)" title="New Screenshot (Ctrl+N)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span class="label">New</span>
      </button>
      <button class="tool-btn" id="gallery-btn" aria-label="Open gallery (Ctrl+G)" title="Open Gallery (Ctrl+G)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span class="label">Gallery</span>
      </button>
    </div>

    <div class="toolbar-group" role="group" aria-label="Save and export">
      <button class="tool-btn" id="copy-btn" aria-label="Copy to clipboard (Ctrl+C)" title="Copy to Clipboard (Ctrl+C)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <span class="label">Copy</span>
      </button>
      <button class="tool-btn" id="save-btn" aria-label="Save screenshot (Ctrl+S)" title="Save (Ctrl+S)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <span class="label">Save</span>
      </button>
    </div>

    <div class="toolbar-group" role="group" aria-label="Zoom controls">
      <button class="tool-btn" id="zoom-out-btn" aria-label="Zoom out (Ctrl+-)" title="Zoom Out (Ctrl+-)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <button class="tool-btn" id="zoom-reset-btn" aria-label="Reset zoom (Ctrl+0)" title="Reset Zoom (Ctrl+0)" style="font-size:11px; min-width:44px;">
        100%
      </button>
      <button class="tool-btn" id="zoom-in-btn" aria-label="Zoom in (Ctrl+=)" title="Zoom In (Ctrl+=)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
    </div>

    <div class="toolbar-group" role="group" aria-label="Window controls">
      <button class="tool-btn" id="close-btn" aria-label="Close window (Esc)" title="Close (Esc)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span class="label">Close</span>
      </button>
    </div>
  </div>

  <div class="canvas-container" id="canvas-container" role="main" aria-label="Screenshot canvas">
    <div class="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>
    <div class="text-input-container" id="text-input-container">
      <textarea class="text-input" id="text-input" placeholder="Type text..." autocomplete="off" rows="1"></textarea>
      <div class="resize-handle nw" data-handle="nw"></div>
      <div class="resize-handle n" data-handle="n"></div>
      <div class="resize-handle ne" data-handle="ne"></div>
      <div class="resize-handle e" data-handle="e"></div>
      <div class="resize-handle se" data-handle="se"></div>
      <div class="resize-handle s" data-handle="s"></div>
      <div class="resize-handle sw" data-handle="sw"></div>
      <div class="resize-handle w" data-handle="w"></div>
    </div>
  </div>

  <div class="status-bar" role="contentinfo" aria-label="Status and keyboard shortcuts">
    <div class="status-info">
      <span id="size-info" aria-live="polite">Size: - × -</span>
      <span id="tool-info" aria-live="polite">Tool: Select</span>
      <span id="position-info" aria-live="off">Position: - , -</span>
      <span id="zoom-info" aria-live="polite">Zoom: 100%</span>
    </div>
    <div role="region" aria-label="Keyboard shortcuts reference">
      <kbd>Ctrl+C</kbd> Copy &nbsp;
      <kbd>Ctrl+S</kbd> Save &nbsp;
      <kbd>Ctrl+Z</kbd> Undo &nbsp;
      <kbd>Del</kbd> Delete &nbsp;
      <kbd>Ctrl+Del</kbd> Clear All &nbsp;
      <kbd>Esc</kbd> Close &nbsp;
      <kbd>Ctrl++/-</kbd> Zoom &nbsp;
      <kbd>Ctrl+0</kbd> Fit
    </div>
  </div>

  <!-- Accessibility live regions -->
  <div id="a11y-live-region" role="status" aria-live="polite" aria-atomic="true" class="visually-hidden"></div>
  <div id="a11y-alert-region" role="alert" aria-live="assertive" aria-atomic="true" class="visually-hidden"></div>

  <style>
    /* Visually hidden but accessible to screen readers */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Enhanced keyboard navigation */
    body.keyboard-navigation button:focus-visible,
    body.keyboard-navigation select:focus-visible,
    body.keyboard-navigation input:focus-visible {
      outline: 2px solid #0078d4;
      outline-offset: 2px;
      box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.3);
    }

    /* High contrast mode support */
    @media (prefers-contrast: high) {
      .tool-btn {
        border-color: #666;
      }
      .tool-btn:focus-visible {
        outline-width: 3px;
      }
    }
  </style>

  <script>
    // Keyboard navigation enhancement
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        document.body.classList.add('keyboard-navigation');
      }
    });

    document.addEventListener('mousedown', () => {
      document.body.classList.remove('keyboard-navigation');
    });

    // Accessibility announcement functions (global scope)
    function announceToScreenReader(message, isAlert = false) {
      const region = isAlert ?
        document.getElementById('a11y-alert-region') :
        document.getElementById('a11y-live-region');
      if (region) {
        region.textContent = '';
        setTimeout(() => {
          region.textContent = message;
        }, 100);
      }
    }

    // Expose functions globally for use by preview.js
    window.announceToScreenReader = announceToScreenReader;
    window.announceAlert = (msg) => announceToScreenReader(msg, true);
    window.announceSuccess = (msg) => announceToScreenReader('Success: ' + msg);
    window.announceError = (msg) => announceToScreenReader('Error: ' + msg, true);
  </script>

  <script src="renderer/preview.js"></script>
</body>
</html>
